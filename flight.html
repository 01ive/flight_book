<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Track Analyser</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
</head>

<body>
    <div class="tabs">
        <a href="index.html" class="tab">🪂 Flight</a>
        <a href="ground.html" class="tab">🌬 Ground Handling</a>
        <a href="flight.html" class="tab active">✈ Track Analyser</a>
        <a href="stats.html" class="tab">📉 Stats</a>
        <div class="right_button">
            <button id="auth-status-btn">🔐 Login</button>
        </div>
    </div>

    <supabase-login></supabase-login>

    <iframe id="content-frame"></iframe>

    <script>
        // Get URL parameters and pass them to the iframe
        const iframeUrl = `https://01ive.github.io/igc_trace_analyser/index.html${window.location.search}`;
        // const iframeUrl = `../client/index.html${window.location.search}`;
        
        document.getElementById('content-frame').src = iframeUrl;

        // Event listener from the iframe to receive data
        window.addEventListener('message', function(event) {
            if (event.data.type === 'IGC_READY') {
                const IgcBlob = event.data.payload;
                const flight = event.data.metadata;

                saveTrackToSupabase(IgcBlob, flight);
            }
        });
    </script>
</body>
<script src="supabase_auth.js"></script>
</html>
