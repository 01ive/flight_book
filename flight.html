<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Track Analyser</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #ccc;
            background: #f7f7f7;
            padding: 8px;
            margin: 0;
        }

        .tab {
            padding: 1px 20px;
            margin-right: 10px;
            text-decoration: none;
            color: #333;
            border: 1px solid #ccc;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            background: white;
        }

        .tab.active {
            font-weight: bold;
            color: blue;
            background: #e9e9e9;
            border-bottom: 2px solid white;
        }

        .tab:hover {
            background: #eee;
        }

        #content-frame {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>
    <div class="tabs">
        <a href="index.html" class="tab">🪂 Flight</a>
        <a href="ground.html" class="tab">🌬 Ground Handling</a>
        <a href="flight.html" class="tab active">✈ Track Analyser</a>
        <a href="stats.html" class="tab">📉 Stats</a>
        <div style="display: float; right; margin-left: auto;">
            <button id="auth-status-btn">🔐 Login</button>
        </div>
    </div>

    <iframe id="content-frame"></iframe>

    <script>
        // Get URL parameters and pass them to the iframe
        const iframeUrl = `https://01ive.github.io/igc_trace_analyser/index.html${window.location.search}`;
        // const iframeUrl = `../client/index.html${window.location.search}`;
        
        document.getElementById('content-frame').src = iframeUrl;

        // Event listener from the iframe to receive data
        window.addEventListener('message', function(event) {
            if (event.data.type === 'IGC_READY') {
                const IgcBlob = event.data.payload;
                const flight = event.data.metadata;

                saveTrackToSupabase(IgcBlob, flight);
            }
        });
    </script>

    <div id="login-modal" style="display:none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);">
        <div style="background-color: white; margin: 15% auto; padding: 20px; border-radius: 10px; width: 300px; text-align: center; position: relative;">
            <span id="close-modal" style="position: absolute; right: 15px; top: 10px; cursor: pointer; font-size: 20px;">&times;</span>
            <h3>Access</h3>
            <input type="email" id="login-email" placeholder="Email" style="width: 90%; margin-bottom: 10px; padding: 8px;">
            <input type="password" id="login-password" placeholder="Mot de passe" style="width: 90%; margin-bottom: 10px; padding: 8px;">
            <button id="do-login" style="width: 95%; padding: 10px; background: #4caf50; color: white; border: none; cursor: pointer;">Connect</button>
            <p id="login-error" style="color: red; font-size: 12px; display: none;"></p>
        </div>
    </div>
</body>
<script src="supabase_auth.js"></script>
</html>
