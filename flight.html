<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Track Analyser</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="tabs.js"></script>
</head>

<body>
    <app-tabs active="track"></app-tabs>

    <supabase-login></supabase-login>

    <iframe id="content-frame"></iframe>

    <script>
        supabaseAuth();
        // Get URL parameters and pass them to the iframe
        const iframeUrl = `https://01ive.github.io/igc_trace_analyser/index.html${window.location.search}`;
        // const iframeUrl = `../client/index.html${window.location.search}`;
        
        document.getElementById('content-frame').src = iframeUrl;

        // Event listener from the iframe to receive data
        window.addEventListener('message', function(event) {
            if (event.data.type === 'IGC_READY') {
                const IgcBlob = event.data.payload;
                const flight = event.data.metadata;

                saveTrackToSupabase(IgcBlob, flight);
            }
        });
    </script>
</body>
</html>
